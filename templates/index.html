<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetBase | OPV Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(180deg, rgba(47, 184, 255, 0.42) 0%, rgba(158, 236, 217, 0) 100%);
            mix-blend-mode: color-dodge;
            animation: move 25s infinite alternate;
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        .blob-2 {
            background: linear-gradient(180deg, rgba(255, 47, 155, 0.3) 0%, rgba(255, 158, 217, 0) 100%);
            animation-delay: -5s;
            animation-duration: 30s;
            right: 0;
            top: 10%;
        }

        .blob-3 {
            background: linear-gradient(180deg, rgba(147, 47, 255, 0.3) 0%, rgba(217, 158, 255, 0) 100%);
            animation-delay: -10s;
            animation-duration: 35s;
            left: 20%;
            bottom: 0;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(10%, 10%) rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen text-slate-200 p-4 md:p-8 relative">
    <!-- Animated Background Blobs -->
    <div class="blob"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    SheetBase
                </h1>
                <p class="text-slate-400 mt-2">Precision OPV Data Management System</p>
            </div>
            <div class="flex gap-3">
                <button onclick="testConnection()" class="glass px-6 py-2.5 rounded-full hover:bg-white/10 transition-all flex items-center gap-2 group">
                    <span id="conn-status-dot" class="w-2 h-2 rounded-full bg-slate-500 group-hover:animate-pulse"></span>
                    Test Connection
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-3xl sticky top-8">
                    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                        Add New OPV
                    </h2>
                    <form id="add-form" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Component Name</label>
                            <input type="text" id="name" required placeholder="e.g. TL072" 
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Supply Voltage</label>
                            <input type="text" id="voltage" required placeholder="e.g. ±15V" 
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                        </div>
                        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-500/20 transition-all transform active:scale-[0.98]">
                            Submit to Database
                        </button>
                    </form>
                    <div id="form-feedback" class="mt-4 text-center text-sm hidden"></div>
                </div>
            </div>

            <!-- List Section -->
            <div class="lg:col-span-2">
                <div class="glass rounded-3xl overflow-hidden flex flex-col h-[calc(100vh-250px)] min-h-[600px]">
                    <div class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                        <h2 class="text-2xl font-semibold flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="3" y2="21"/><line x1="15" x2="15" y1="3" y2="21"/></svg>
                            Inventory List
                        </h2>
                        <span id="item-count" class="bg-blue-500/20 text-blue-300 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">
                            Loading...
                        </span>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
                        <table class="w-full text-left">
                            <thead class="text-slate-400 text-sm uppercase tracking-wider">
                                <tr>
                                    <th class="pb-4 font-medium">ID</th>
                                    <th class="pb-4 font-medium">Name</th>
                                    <th class="pb-4 font-medium">Supply Voltage</th>
                                    <th class="pb-4 font-medium text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="opv-list" class="divide-y divide-white/5">
                                <!-- Items will be injected here -->
                            </tbody>
                        </table>
                        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-slate-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 mb-4 opacity-20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                            <p>No components found in the database.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 right-8 glass px-6 py-4 rounded-2xl translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 z-50">
        <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center"></div>
        <p id="toast-msg" class="font-medium"></p>
    </div>

    <script>
        // API Calls
        async function fetchOPVs() {
            try {
                const response = await fetch('/opv');
                const data = await response.json();
                renderOPVs(data);
            } catch (error) {
                showToast('Failed to fetch data', 'error');
            }
        }

        async function addOPV(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const voltage = document.getElementById('voltage').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;

            btn.disabled = true;
            btn.innerText = 'Processing...';

            try {
                const response = await fetch('/add-opv', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, power_supply_voltage: voltage })
                });
                
                if (response.ok) {
                    showToast('Component added successfully!', 'success');
                    e.target.reset();
                    fetchOPVs();
                } else {
                    throw new Error('Failed to add');
                }
            } catch (error) {
                showToast('Error adding component', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        async function testConnection() {
            const dot = document.getElementById('conn-status-dot');
            dot.classList.remove('bg-slate-500', 'bg-emerald-500', 'bg-red-500');
            dot.classList.add('bg-yellow-500', 'animate-pulse');

            try {
                const response = await fetch('/test-db');
                const data = await response.json();
                
                if (data.database === 'connected') {
                    dot.classList.replace('bg-yellow-500', 'bg-emerald-500');
                    showToast('Database connection stable', 'success');
                } else {
                    throw new Error();
                }
            } catch (error) {
                dot.classList.replace('bg-yellow-500', 'bg-red-500');
                showToast('Database connection failed', 'error');
            } finally {
                dot.classList.remove('animate-pulse');
            }
        }

        // UI Rendering
        function renderOPVs(items) {
            const container = document.getElementById('opv-list');
            const countLabel = document.getElementById('item-count');
            const emptyState = document.getElementById('empty-state');
            
            container.innerHTML = '';
            countLabel.innerText = `${items.length} Components`;

            if (items.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            items.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'group hover:bg-white/5 transition-colors';
                tr.innerHTML = `
                    <td class="py-4 text-slate-500 font-mono text-sm">${item.id}</td>
                    <td class="py-4 font-semibold text-slate-200">${item.name}</td>
                    <td class="py-4 text-slate-400">${item.power_supply_voltage || 'N/A'}</td>
                    <td class="py-4 text-right">
                        <button class="opacity-0 group-hover:opacity-100 p-2 hover:bg-white/10 rounded-lg transition-all text-slate-400 hover:text-white">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                        </button>
                    </td>
                `;
                container.appendChild(tr);
            });
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msgEl = document.getElementById('toast-msg');

            msgEl.innerText = msg;
            
            if (type === 'success') {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center bg-emerald-500/20 text-emerald-400';
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
            } else {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center bg-red-500/20 text-red-400';
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
            }

            toast.classList.remove('translate-y-24', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 3000);
        }

        // Init
        document.getElementById('add-form').addEventListener('submit', addOPV);
        fetchOPVs();
    </script>
</body>
</html>
